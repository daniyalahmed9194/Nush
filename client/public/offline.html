<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NUSH Admin — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #292974;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Arial', sans-serif;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      max-width: 380px;
      width: 100%;
    }
    .logo {
      background: #ffce1b;
      display: inline-block;
      padding: 10px 24px;
      border-radius: 12px;
      font-size: 28px;
      font-weight: 900;
      color: #292974;
      letter-spacing: -1px;
      margin-bottom: 32px;
    }
    .icon {
      font-size: 56px;
      margin-bottom: 20px;
    }
    h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    p {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    button {
      background: #ffce1b;
      color: #292974;
      border: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">NUSH</div>
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. Please check your network and try again to see live orders.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
